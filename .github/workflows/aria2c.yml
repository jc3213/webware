name: build-aria2c-weekly

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  build-windows-docker:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout aria2
      uses: actions/checkout@v4
      with:
        repository: aria2/aria2
        fetch-depth: 1

    - name: Build Windows binary using Dockerfile.mingw
      run: |
        docker build -f Dockerfile.mingw -t aria2-mingw .
        container_id=$(docker create aria2-mingw)
        docker cp $container_id:/aria2/aria2-*-mingw-w64.zip .
        docker rm $container_id

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: "*.zip"
