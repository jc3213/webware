name: build-aria2c-weekly

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout aria2
      uses: actions/checkout@v4
      with:
        repository: aria2/aria2
        fetch-depth: 1

    - name: Setup MSYS2 + MinGW
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-zlib

    - name: Build aria2 (mingw-config + make)
      shell: msys2 {0}
      run: |
        ./mingw-config
        make -j$(nproc)

    - name: Package release (mingw-release)
      shell: msys2 {0}
      run: |
        ./mingw-release

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: "*.zip"
