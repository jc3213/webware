name: build-aria2c-weekly

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  build-windows-cross:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout aria2
      uses: actions/checkout@v4
      with:
        repository: aria2/aria2
        fetch-depth: 1

    - name: Install cross-compile toolchain + deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          mingw-w64 \
          autoconf automake autotools-dev autopoint libtool \
          pkg-config \
          libc-ares-dev \
          libexpat1-dev \
          libsqlite3-dev \
          zlib1g-dev \
          libssh2-1-dev \
          libgmp-dev \
          libcppunit-dev

    - name: Generate configure script
      run: |
        autoreconf -i

    - name: Configure for Windows (mingw-config)
      run: |
        HOST=x86_64-w64-mingw32 ./mingw-config

    - name: Build aria2 (cross-compile)
      run: |
        make -j$(nproc)

    - name: Package release (mingw-release)
      run: |
        ./mingw-release

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: "*.zip"
