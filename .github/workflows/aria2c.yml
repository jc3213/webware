name: build-aria2c-weekly

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout aria2
      uses: actions/checkout@v4
      with:
        repository: aria2/aria2
        fetch-depth: 1

    - name: Install MSYS2 + MinGW
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-zlib

    - name: Build aria2 (MinGW)
      shell: msys2 {0}
      run: |
        autoreconf -i
        ./configure --with-openssl --disable-nls
        make -j$(nproc)

    - name: Upload aria2.exe
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: src/aria2c.exe
