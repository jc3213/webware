name: build-aria2-weekly

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  build-windows-docker:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout aria2
      uses: actions/checkout@v4
      with:
        repository: aria2/aria2
        fetch-depth: 1

    - name: Patch Dockerfile.mingw (replace GMP source + filename)
      run: |
        sed -i 's|https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz|https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz|' Dockerfile.mingw

    - name: Build Windows binary using Dockerfile.mingw
      run: |
        docker build -f Dockerfile.mingw -t aria2-mingw .
        cid=$(docker create aria2-mingw)
        docker cp "$cid":/aria2/src/aria2c.exe ./aria2c.exe
        docker rm "$cid"

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-windows
        path: aria2c.exe
