<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Sample - Download with Aria2</title>
    <link rel="stylesheet" href="/download_with_aria2/chromium/pages/common.css">
    <style>
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: auto;
    width: 300px;
    height: 80vh;
    gap: 3px;
}

button {
    padding: 10px 40px !important;
    font-size: 20px;
    cursor: pointer;
}

textarea {
    width: 600px;
    height: 300px;
    resize: none;
    font-size: 20px;
}
</style>
</head>
<body>
    <button>Run</button>
    <textarea disabled></textarea>
    <script src="https://jc3213.github.io/download_with_aria2/inject.js"
            integrity="sha512-GlG/srJd4raj3P4ZEioaf6lZAeEpgslB0CKYzqsi+WbsWYRBh33Zb9gs1KpmhU5xLKTyMForjgLKR6TQzmRX5Q=="
            crossorigin="anonymous"></script>
    <script>
let [testBtn, testResult] = document.body.children;

function startTest() {
    testBtn.disabled = true;
    testResult.value = 'Evaluating if "Download With Aria2" is higher than v4.17.0.3548....';
    aria2c.status().then(onSuccess).catch(onFailure);
}

function onSuccess(result) {
    let { name, version } = result.manifest ?? result;
    testResult.value = 'Extension Name: ' + name + '\nVersion: ' + version;
    testBtn.disabled = false;
}

function onFailure(error) {
    testResult.value = error;
    testBtn.disabled = false;
}

testBtn.addEventListener('click', startTest);

startTest();
    </script>
</body>
</html>
