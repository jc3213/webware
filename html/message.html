<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Sample - Download with Aria2</title>
    <link rel="stylesheet" href="/download_with_aria2/chromium/pages/common.css">
    <style>
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: auto;
    width: 300px;
    height: 80vh;
    gap: 3px;
}

button {
    padding: 10px 40px !important;
    font-size: 20px;
    cursor: pointer;
}

textarea {
    width: 600px;
    height: 300px;
    resize: none;
    font-size: 20px;
}
</style>
</head>
<body>
    <button>Run</button>
    <textarea disabled></textarea>
    <script>
let count = 0;
const calls = {};

function messaging(aria2c, params) {
    return new Promise(function(resolve, reject) {
        let id = ++count;
        let timer = setTimeout(function() {
            delete calls[id];
            reject( new Error('"Download With Aria2" is either not installed, disabled, or lower than v4.17.0.3548.') );
        }, 3000);
        calls[id] = function(result) {
            clearTimeout(timer);
            delete calls[id];
            resolve(result);
        };
        window.postMessage({ aria2c, id, params });
    });
};

window.addEventListener('message', function(event) {
    const { aria2c, id, result } = event.data;
    if (aria2c === 'aria2c_response') {
        calls[id]?.(result);
    }
});

const [testBtn, testResult] = document.body.children;

function startTest() {
    testBtn.disabled = true;
    testResult.value = 'Evaluating if "Download With Aria2" is higher than v4.17.0.3548....';
    setTimeout(() => messaging('aria2c_status').then(onSuccess).catch(onFailure), 1000);
}

function onSuccess(result) {
    const { name, version } = result.system ?? result.manifest ?? result;
    testResult.value = 'Extension Name: ' + name + '\nVersion: ' + version;
    testBtn.disabled = false;
}

function onFailure(error) {
    testResult.value = error;
    testBtn.disabled = false;
}

testBtn.addEventListener('click', startTest);

startTest();
    </script>
</body>
</html>
