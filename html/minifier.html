<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PAC 脚本压缩工具</title>
        <link rel="stylesheet" href="/download_with_aria2/chromium/pages/common.css">
        <style>
body {
    align-items: center;
    display: flex;
    flex-direction: column;
    gap: 3px;
    height: 80vh;
    justify-content: center;
    margin: auto;
    text-align: center;
    width: 380px;
}

button {
    cursor: pointer;
    font-size: 20px;
    margin: 5px;
    padding: 5px 20px;
}

textarea {
    font-size: 20px;
    height: 300px;
    resize: none;
    width: 600px;
}
        </style>
    </head>
    <body>
        <div>
            <h1>输入</h1>
            <input id="fileInput" type="file" accept=".pac">
            <textarea id="textInput" placeholder="输入/粘贴代码，或拖拽文件到这里..."></textarea>
        </div>
        <div>
            <h1>结果</h1>
            <button onclick="minifyFile()">压缩</button>
            <button onclick="copyFile()">复制</button>
            <button onclick="downloadFile()">下载</button>
            <textarea id="textOutput" placeHolder="这里将输出结果..." readonly></textarea>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>
        <script>
let currentCode;
let minifiedCode;
let minifiedBlob;
let minifiedFileName = 'minified.pac';
let lastMinifiedCode;

const fileInput = document.getElementById('fileInput');
const textInput = document.getElementById('textInput');
const textOutput = document.getElementById('textOutput');
const fileOutput = document.createElement('a');

fileInput.addEventListener('change', async (event) => {
    textInput.readOnly = true;
    textInput.value = await readFile(event.target.files[0]);
});

textInput.addEventListener('change', (event) => {
    currentCode = textInput.value;
});

textInput.addEventListener('dragover', (event) => {
    event.preventDefault();
});

textInput.addEventListener('drop', async (event) => {
    event.preventDefault();
    for (let file of event.dataTransfer.files) {
        if (file.name.endsWith('.pac')) {
            textInput.value = await readFile(file);
            break;
        }
    }
});

function readFile(file) {
    minifiedFileName = "minified_" + file.name;
    return new Promise((resolve, reject) => {
        let reader = new FileReader();
        reader.onload = () => resolve(currentCode = reader.result);
        reader.onerror = reject;
        reader.readAsText(file);
    });
}

function minifyFile() {
    return Terser.minify(textInput.value)
        .then((result) => {
            textOutput.value = minifiedCode = result.code;
        })
        .catch((error) => {
            alert('压缩失败: ' + error.message);
        });
}

async function copyFile() {
    if (!currentCode) {
        return alert('复制失败: 没有可供复制的内容');
    }
    if (!minifiedCode) {
        await minifyFile();
    }
    navigator.clipboard.writeText(minifiedCode)
        .then(() => alert('已成功复制结果'))
        .catch(() => alert('复制失败: 没有权限，请检查浏览器设置'));
}

async function downloadFile() {
    if (!currentCode) {
        return alert('下载失败: 没有可供下载的内容');
    }
    if (!minifiedCode || minifiedCode !== lastMinifiedCode) {
        await minifyFile();
        lastMinifiedCode = minifiedCode;
        let blob = new Blob([minifiedCode]);
        URL.revokeObjectURL(minifiedBlob);
        minifiedBlob = URL.createObjectURL(blob);
    }
    fileOutput.href = minifiedBlob;
    fileOutput.download = minifiedFileName;
    fileOutput.click();
}
        </script>
    </body>
</html>
